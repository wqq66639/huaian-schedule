<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>淮小信服务台 - 班级课表查询</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#f0f2f5;color:#333}
.top-bar{background:#1e6fb8;color:#fff;height:62px;display:flex;align-items:center;padding:0 20px;position:fixed;top:0;left:0;right:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.top-bar .logo{font-size:20px;font-weight:bold;letter-spacing:2px}
.top-bar .user{margin-left:auto;font-size:13px;opacity:.85}
.main{margin:80px 0 0 20px;max-width:1200px;padding:0 20px 40px}
.breadcrumb{font-size:13px;color:#999;margin-bottom:15px}
.breadcrumb span{color:#1e6fb8}

/* Search panel - 仿官网筛选区域 */
.search-card{background:#fff;border-radius:8px;padding:20px 25px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.search-card h3{font-size:16px;color:#1e6fb8;margin-bottom:15px;padding-bottom:10px;border-bottom:1px solid #eee}
.filter-row{display:flex;gap:15px;flex-wrap:wrap;align-items:flex-end;margin-bottom:12px}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-group label{font-size:13px;color:#666;font-weight:500}
.filter-group select,.filter-group input{padding:8px 12px;border:1px solid #d0d0d0;border-radius:6px;font-size:14px;font-family:inherit;outline:none;background:#fff;min-width:160px;transition:.2s}
.filter-group select:focus,.filter-group input:focus{border-color:#1e6fb8;box-shadow:0 0 0 2px rgba(30,111,184,.1)}
.btn-row{display:flex;gap:10px;margin-top:5px}
.btn{padding:9px 24px;background:#1e6fb8;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;transition:.2s;font-family:inherit}
.btn:hover{background:#175a96}
.btn-outline{background:#fff;color:#1e6fb8;border:1px solid #1e6fb8}
.btn-outline:hover{background:#e8f0fe}

/* Result */
.result-card{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden}
.result-header{background:#f8f9fa;padding:14px 20px;border-bottom:1px solid #e8e8e8;display:flex;justify-content:space-between;align-items:center}
.result-header .title{font-size:15px;font-weight:bold;color:#333}
.result-header .info{font-size:13px;color:#999}

/* Grid table */
.grid-wrap{overflow-x:auto;padding:15px}
.grid-wrap table{width:100%;border-collapse:collapse;font-size:13px;min-width:950px}
.grid-wrap th{background:#1e6fb8;color:#fff;padding:10px 8px;text-align:center;font-weight:500;min-width:120px}
.grid-wrap th:first-child{min-width:75px;background:#175a96}
.grid-wrap td{border:1px solid #e0e0e0;padding:6px;vertical-align:top;height:58px;width:14%}
.course-cell{font-size:12px;line-height:1.5}
.course-cell .cn{font-weight:bold;color:#1565c0;display:block;margin-bottom:2px}
.course-cell .ci{color:#888;font-size:11px}
.course-empty{color:#ddd;text-align:center;font-size:18px;padding-top:12px}

/* Empty state */
.empty-state{text-align:center;padding:60px;color:#999}
.empty-state .icon{font-size:48px;display:block;margin-bottom:10px}

/* Stats */
.stats-row{display:flex;gap:12px;margin-bottom:20px}
.stat-card{flex:1;background:#fff;border-radius:8px;padding:14px 18px;box-shadow:0 1px 4px rgba(0,0,0,.08);text-align:center}
.stat-card .num{font-size:26px;font-weight:bold;color:#1e6fb8}
.stat-card .lbl{font-size:12px;color:#999;margin-top:2px}
.stat-card:nth-child(2) .num{color:#e67e22}
.stat-card:nth-child(3) .num{color:#27ae60}
.stat-card:nth-child(4) .num{color:#8e44ad}

@media(max-width:768px){
  .top-bar{height:48px;padding:0 10px}
  .top-bar .logo{font-size:17px;letter-spacing:1px}
  .top-bar .user{display:none}
  .sidebar{display:none}
  .main{margin:52px 0 0 0;padding:10px 8px 15px}
  .breadcrumb{font-size:12px;margin-bottom:10px}
  .filter-row{flex-direction:column;gap:6px}
  .filter-group{flex:1}
  .filter-group label{font-size:12px}
  .filter-group select,.filter-group input{min-width:100%;padding:10px 12px;font-size:16px;border-radius:8px}
  .search-panel{flex-direction:column;padding:12px;border-radius:10px;gap:8px}
  .search-panel input{font-size:16px;padding:10px 12px}
  .btn{padding:12px 20px;font-size:16px;border-radius:8px;width:100%}
  .btn-outline{width:100%}
  .stats-row{flex-wrap:wrap;gap:6px}
  .stat-card{flex:1 1 45%;padding:10px 8px;border-radius:8px}
  .stat-card .num{font-size:24px}
  .stat-card .lbl{font-size:11px}
  .grid-wrap{padding:5px;border-radius:10px}
  .grid-wrap table{min-width:650px;font-size:11px}
  .grid-wrap th{min-width:65px;padding:8px 3px;font-size:11px}
  .grid-wrap th:first-child{min-width:50px;font-size:10px}
  .grid-wrap td{height:45px;padding:3px 2px}
  .course-cell{padding:2px 3px;margin:1px 0;border-radius:3px}
  .course-cell .cn{font-size:11px;line-height:1.3}
  .course-cell .ci{font-size:10px;line-height:1.2}
  .result-header{flex-direction:column;gap:4px;padding:10px 14px}
  .result-header .title{font-size:14px}
  .result-header .info{font-size:12px}
  .data-table th{font-size:11px;padding:8px 6px}
  .data-table td{font-size:11px;padding:8px 6px}
  .data-table td:nth-child(4){max-width:80px}
}
</style>
</head>
<body>

<div class="top-bar">
    <div class="logo">淮小信服务台</div>
    <div class="user">淮安大学 | 班级课表查询</div>
</div>

<div class="main">
    <div class="breadcrumb">首页 <span>> 培养管理 > 我的课表 > 各类课表 > 班级课表查询</span></div>

    <!-- Stats -->
    <div class="stats-row">
        <div class="stat-card"><div class="num" id="s1">-</div><div class="lbl">院系数</div></div>
        <div class="stat-card"><div class="num" id="s2">-</div><div class="lbl">班级数</div></div>
        <div class="stat-card"><div class="num" id="s3">-</div><div class="lbl">课程总数</div></div>
        <div class="stat-card"><div class="num" id="s4">-</div><div class="lbl">教师数</div></div>
    </div>

    <!-- Filter panel -->
    <div class="search-card">
        <h3>📋 班级课表查询</h3>
        <div class="filter-row">
            <div class="filter-group">
                <label>📅 学年学期</label>
                <select id="selXnxq" onchange="onXnxqChange()"><option value="">全部</option></select>
            </div>
            <div class="filter-group">
                <label>🏫 院系</label>
                <select id="selDept" onchange="onDeptChange()"><option value="">请选择院系</option></select>
            </div>
            <div class="filter-group">
                <label>🎓 年级</label>
                <select id="selGrade" onchange="onGradeChange()"><option value="">请选择年级</option></select>
            </div>
            <div class="filter-group">
                <label>📖 专业</label>
                <select id="selMajor" onchange="onMajorChange()"><option value="">请选择专业</option></select>
            </div>
            <div class="filter-group">
                <label>👥 班级</label>
                <select id="selClass" onchange="onClassChange()"><option value="">请选择班级</option></select>
            </div>
        </div>
        <div class="filter-row" style="margin-top:8px">
            <div class="filter-group" style="flex:2">
                <label>🔍 快速搜索</label>
                <input type="text" id="quickSearch" placeholder="输入课程名/教师/教室快速定位..." oninput="quickFilter()">
            </div>
            <div class="btn-row" style="align-self:flex-end">
                <button class="btn" onclick="doQuery()">🔎 查询</button>
                <button class="btn btn-outline" onclick="resetAll()">↺ 重置</button>
            </div>
        </div>
    </div>

    <!-- Result -->
    <div class="result-card">
        <div class="result-header">
            <div class="title" id="resultTitle">请选择筛选条件后点击查询</div>
            <div class="info" id="resultInfo"></div>
        </div>
        <div class="grid-wrap" id="gridContainer">
            <div class="empty-state"><span class="icon">📅</span>选择院系→年级→专业→班级后，显示课程表</div>
        </div>
    </div>
</div>

var allDepts = new Set();
var allClasses = new Set();
var allTeachers = new Set();

D.forEach(function(d){
    var raw = d.c;
    var deptName = '', grade = '', major = '', simpleClass = raw;

    // Format: "[2025-2026-1] [201]机械与材料工程学院 2024级 建筑工程"
    // Strip xnxq prefix
    var noXnxq = raw.replace(/^\[\d{4}-\d{4}-\d\]\s*/, '');

    // Strip dept code: "[201]机械..." -> "机械..."
    deptName = noXnxq.replace(/^\[\d+\]\s*/, '');

    // Extract grade and major
    var gradeMatch = deptName.match(/(\d{4})级\s+(.+)/);
    if (gradeMatch) {
        deptName = deptName.replace(/\s+\d{4}级\s+.+$/, '');
        grade = gradeMatch[1];
        major = gradeMatch[2];
        simpleClass = gradeMatch[2];
    }

    allDepts.add(deptName);
    allClasses.add(simpleClass);
    if (d.t) allTeachers.add(d.t);

    if (!deptMap[deptName]) deptMap[deptName] = {grades:{}};
    if (!deptMap[deptName].grades[grade]) deptMap[deptName].grades[grade] = {majors:{}};
    if (!deptMap[deptName].grades[grade].majors[major]) deptMap[deptName].grades[grade].majors[major] = {classes:{}};

    // Use class numbers as class options, fallback to major
    var cnList = d.cn || [];
    if (cnList.length > 0) {
        cnList.forEach(function(cn){
            if (!deptMap[deptName].grades[grade].majors[major].classes[cn]) deptMap[deptName].grades[grade].majors[major].classes[cn] = [];
            deptMap[deptName].grades[grade].majors[major].classes[cn].push(d);
        });
    } else {
        // Fallback to major name
        if (!deptMap[deptName].grades[grade].majors[major].classes[simpleClass]) deptMap[deptName].grades[grade].majors[major].classes[simpleClass] = [];
        deptMap[deptName].grades[grade].majors[major].classes[simpleClass].push(d);
    }
});

function resetAll(){
    document.getElementById('selXnxq').value = '';
    document.getElementById('selDept').value = '';
    document.getElementById('selGrade').innerHTML = '<option value="">-- 请选择 --</option>';
    document.getElementById('selMajor').innerHTML = '<option value="">-- 请选择 --</option>';
    document.getElementById('selClass').innerHTML = '<option value="">-- 请选择 --</option>';
    document.getElementById('quickSearch').value = '';
    currentFilteredData = D;
    renderEmpty();
}

function renderGrid(data){
    if (!data || !data.length){
        renderEmpty(); return;
    }

    var cls = document.getElementById('selClass').value;
    var title = cls || (data[0].c + ' 等');
    document.getElementById('resultTitle').textContent = title;
    document.getElementById('resultInfo').textContent = data.length + ' 条课程';

    var days = ['星期一','星期二','星期三','星期四','星期五','星期六','星期日'];
    var periods = [];
    var seen = {};
    data.forEach(function(d){ if(!seen[d.p]){seen[d.p]=true;periods.push(d.p)}});
    periods.sort();

    var map = {};
    data.forEach(function(d){ var k=d.d+'|'+d.p; if(!map[k])map[k]=[];map[k].push(d)});

    var h = '<table><tr><th>节次</th>';
    days.forEach(function(d){ h+='<th>'+d+'</th>' });
    h += '</tr>';

    if (periods.length === 0) {
        h += '<tr><td colspan="8" style="text-align:center;padding:30px;color:#999">该班级暂无排课数据</td></tr>';
    } else {
        periods.forEach(function(p){
            h += '<tr><td style="text-align:center;font-weight:bold;background:#f8f9fa;min-width:75px">'+p+'</td>';
            days.forEach(function(d){
                var cs = map[d+'|'+p] || [];
                h += '<td>';
                if (cs.length){
                    cs.forEach(function(c){
                        h += '<div class="course-cell"><span class="cn">'+esc(c.n)+'</span><span class="ci">'+esc(c.t)+'</span><span class="ci">'+esc(c.r)+'</span><span class="ci" style="color:#999">'+esc(c.w)+'</span></div>';
                    });
                } else {
                    h += '<div class="course-empty">&middot;</div>';
                }
                h += '</td>';
            });
            h += '</tr>';
        });
    }
    h += '</table>';
    document.getElementById('gridContainer').innerHTML = h;
}

function renderEmpty(){
    document.getElementById('resultTitle').textContent = '请选择筛选条件';
    document.getElementById('resultInfo').textContent = '';
    document.getElementById('gridContainer').innerHTML = '<div class="empty-state"><span class="icon">📅</span>选择 院系→年级→专业→班级 后显示课程表</div>';
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Init - show empty, wait for user to filter
renderEmpty();
</script>
